# 应用服务 WEB 访问端口
server:
  port: 8080

# 默认数据库配置
spring:
  profiles:
    active: postgresql  # 默认使用PostgreSQL，可以通过JVM参数或环境变量覆盖

# JWT配置
# 生产环境必须通过环境变量 JWT_SECRET 注入不少于 64 字节的强密钥；
# 此处不提供默认值，未注入时非 dev profile 将拒绝启动。
jwt:
  secret: ${JWT_SECRET:}
  issuer: system
  access-token-expiration: 7200000   # 2 小时（毫秒）
  refresh-token-expiration: 604800000 # 7 天（毫秒）
  # 校验策略：dev profile 下放行弱密钥；非 dev profile 下弱/默认密钥拒绝启动
  enforce-secret: true

# 应用自定义配置
app:
  database:
    # 是否自动初始化数据库表（开发环境建议设为true，生产环境建议设为false）
    auto-init: true
  # 时区双策略：内部固定 UTC；对外默认上海时间（可配置）
  timezone:
    internal: UTC
    external: Asia/Shanghai
    external-serialization-enabled: true

# 公共MyBatis Plus配置
mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.example.system.entity
  configuration:
    map-underscore-to-camel-case: true
    # SQL 日志默认关闭；dev 环境如需查看 SQL 改为 org.apache.ibatis.logging.stdout.StdOutImpl
    log-impl: org.apache.ibatis.logging.nologging.NoLoggingImpl