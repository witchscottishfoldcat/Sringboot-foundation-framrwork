# MySQL 数据库配置
spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/systemDome?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=UTC
    username: root
    password: 123456

  # MyBatis-Plus MySQL 专用配置（持久层统一为 MyBatis-Plus，不再使用 JPA/Hibernate）
  mybatis-plus:
    global-config:
      db-config:
        logic-delete-field: deleted
        logic-delete-value: 1
        logic-not-delete-value: 0

# SQL 日志：dev 开 stdout，其它环境（生产）应保持关闭，避免泄露参数
mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.nologging.NoLoggingImpl
